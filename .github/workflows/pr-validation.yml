name: PR/Commit validation of FPSLocker Patches

on:
  pull_request:
    branches:
      - v4
  push:
    branches:
      - v4
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  validate-patches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GCC and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Clone FPSLocker repository
        run: |
          git clone https://github.com/masagrator/FPSLocker.git FPSLocker

      - name: Build FPSLocker tester
        run: |
          cd FPSLocker/tester
          python run.py

      - name: Verify my_program executable exists
        run: |
          if [ ! -f "FPSLocker/tester/my_program" ]; then
            echo "Error: my_program executable not found"
            exit 1
          fi

      - name: Find and validate all YAML patch files
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/SaltySD/plugins/FPSLocker/patches"
          EXECUTABLE="${GITHUB_WORKSPACE}/FPSLocker/tester/my_program"
          FAILED=0
          MAX_PARALLEL=2
          
          if [ ! -d "$PATCH_DIR" ]; then
            echo "Error: Patches directory not found at $PATCH_DIR"
            exit 1
          fi
          
          # Find all .yaml files and store them in an array
          yaml_files=()
          while IFS= read -r yaml_file; do
            yaml_files+=("$yaml_file")
          done < <(find "$PATCH_DIR" -type f -name "*.yaml")
          
          echo "Found ${#yaml_files[@]} YAML files to validate"
          
          # Create a temporary directory for results
          TEMP_DIR=$(mktemp -d)
          
          # Function to validate a single file
          validate_file() {
            local yaml_file="$1"
            local index="$2"
            local result_file="$TEMP_DIR/result_$index"
            
            echo "[Job $index] Validating: $yaml_file"
            
            # Execute my_program with the yaml file path
            if "$EXECUTABLE" "$yaml_file"; then
              # Extract filename without extension
              filename=$(basename "$yaml_file" .yaml)
              
              echo "[Job $index] Checking if '$filename' exists in the file with a leading space..."
              
              # Check if the filename (with a leading space) exists in the file
              if grep -q " $filename" "$yaml_file"; then
                echo "[Job $index] ✓ Found ' $filename' in $yaml_file"
                echo "0" > "$result_file"
              else
                echo "[Job $index] ✗ Error: ' $filename' not found in $yaml_file"
                echo "1" > "$result_file"
              fi
            else
              echo "[Job $index] Failed validation for: $yaml_file"
              echo "1" > "$result_file"
            fi
          }
          
          export -f validate_file
          export EXECUTABLE
          export TEMP_DIR
          
          # Process files with controlled parallelism
          running=0
          index=0
          
          for yaml_file in "${yaml_files[@]}"; do
            # Wait if we've reached max parallel jobs
            while [ $running -ge $MAX_PARALLEL ]; do
              wait -n
              running=$((running - 1))
            done
            
            # Start validation in background
            validate_file "$yaml_file" "$index" &
            running=$((running + 1))
            index=$((index + 1))
          done
          
          # Wait for all remaining jobs to complete
          wait
          
          # Check all result files
          for result_file in "$TEMP_DIR"/result_*; do
            if [ -f "$result_file" ]; then
              result=$(cat "$result_file")
              if [ "$result" -ne 0 ]; then
                FAILED=1
              fi
            fi
          done
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          
          if [ $FAILED -eq 1 ]; then
            echo "One or more patch files failed validation"
            exit 1
          fi
          
          echo "All patch files validated successfully"

      - name: Report results
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✓ PR validation passed"
          else
            echo "✗ PR validation failed"
            exit 1
          fi
