# SnowRunner 1.0.40
# BID: 54551AEABF6E1F41
# Just search for 0x42055555

DECLARATIONS:
  -
    type: variable
    name: dr_target
    value_type: float
    default_value: 33.333333
    evaluate: FRAMETIME_TARGET
MASTER_WRITE:
# Redirect DR frametime target
  -
    type: asm_a64
    main_offset: 0x193CEA8
    instructions: [
      [adrp, x10, $dr_target],
      [ldr, s2, [x10, $dr_target]]
    ]
